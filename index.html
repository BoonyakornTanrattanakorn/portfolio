<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boonyakorn Tanrattanakorn — CV</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
      }

      .layout {
        display: flex;
        height: 100vh;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: 220px;
        flex-shrink: 0;
        background: #fff;
        border-right: 1px solid #e8e8e8;
        display: flex;
        flex-direction: column;
        padding: 28px 16px 20px;
        gap: 6px;
        overflow-y: auto;
      }

      .profile {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding-bottom: 20px;
        margin-bottom: 8px;
        border-bottom: 1px solid #eee;
      }

      .avatar {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #1a1a1a;
        color: #fff;
        font-size: 20px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }

      .profile h1 {
        font-size: 0.85rem;
        font-weight: 700;
        line-height: 1.3;
      }

      .profile p {
        font-size: 0.73rem;
        color: #888;
        margin-top: 3px;
        line-height: 1.4;
      }

      .section-label {
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #aaa;
        padding: 10px 8px 4px;
      }

      .nav-btn {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 9px 10px;
        border-radius: 7px;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        border: none;
        background: transparent;
        color: #444;
        text-align: left;
        width: 100%;
        transition: background 0.12s, color 0.12s;
        text-decoration: none;
      }

      .nav-btn:hover { background: #f0f0f0; color: #1a1a1a; }

      .nav-btn.active {
        background: #1a1a1a;
        color: #fff;
      }

      .nav-btn .icon { font-size: 1rem; flex-shrink: 0; }

      .spacer { flex: 1; }

      .footer {
        font-size: 0.7rem;
        color: #ccc;
        text-align: center;
        padding-top: 12px;
        border-top: 1px solid #eee;
        line-height: 1.5;
      }

      .footer a { color: #bbb; text-decoration: underline; }
      .footer a:hover { color: #888; }

      /* ── Content ── */
      .content {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: none;
      }

      iframe.active { display: block; }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="profile">
          <div class="avatar">BT</div>
          <h1>Boonyakorn Tanrattanakorn</h1>
          <p>Computer Engineering<br>Chulalongkorn University</p>
        </div>

        <span class="section-label">View</span>
        <button class="nav-btn active" id="btn-html" onclick="show('html')">
          <span class="icon">📄</span> CV (HTML)
        </button>
        <button class="nav-btn" id="btn-pdf" onclick="show('pdf')">
          <span class="icon">📋</span> CV (PDF)
        </button>

        <span class="section-label">Download</span>
        <a class="nav-btn" href="CV/Boonyakorn_Tanrattanakorn_CV.pdf" download>
          <span class="icon">⬇️</span> Download PDF
        </a>

        <div class="spacer"></div>

        <div class="footer">
          Generated with<br>
          <a href="https://github.com/rendercv/rendercv" target="_blank" rel="noopener">RenderCV</a>
        </div>
      </aside>

      <main class="content">
        <iframe id="frame-html" class="active" src="CV/Boonyakorn_Tanrattanakorn_CV.html" title="CV HTML"></iframe>
        <iframe id="frame-pdf" src="CV/Boonyakorn_Tanrattanakorn_CV.pdf" title="CV PDF"></iframe>
      </main>
    </div>

    <script>
      function show(type) {
        const htmlFrame = document.getElementById('frame-html');
        const pdfFrame  = document.getElementById('frame-pdf');
        const btnHtml   = document.getElementById('btn-html');
        const btnPdf    = document.getElementById('btn-pdf');

        if (type === 'html') {
          htmlFrame.classList.add('active');
          pdfFrame.classList.remove('active');
          btnHtml.classList.add('active');
          btnPdf.classList.remove('active');
        } else {
          pdfFrame.classList.add('active');
          htmlFrame.classList.remove('active');
          btnPdf.classList.add('active');
          btnHtml.classList.remove('active');
        }
      }
    </script>
  </body>
</html>
