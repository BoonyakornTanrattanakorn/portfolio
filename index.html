<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boonyakorn Tanrattanakorn — CV</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
      }

      .layout {
        display: flex;
        height: 100vh;
      }

      #sidebar-container {
        display: contents;
      }

      /* ── Content ── */
      .content {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: none;
      }

      iframe.active { display: block; }
    </style>
  </head>
  <body>
    <div class="layout">
      <div id="sidebar-container"></div>

      <main class="content" id="content-area">
      </main>
    </div>

    <script>
      fetch('sidebar.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById('sidebar-container').innerHTML = html;

          const content = document.getElementById('content-area');
          const buttons = document.querySelectorAll('[data-src]');

          // Create an iframe for each data-src button
          buttons.forEach((btn, i) => {
            const frame = document.createElement('iframe');
            frame.src = btn.dataset.src;
            frame.title = btn.textContent.trim();
            frame.dataset.frame = i;
            if (i === 0) frame.classList.add('active');
            content.appendChild(frame);

            // Generic click handler
            btn.addEventListener('click', () => {
              document.querySelectorAll('#content-area iframe').forEach(f => f.classList.remove('active'));
              document.querySelectorAll('[data-src]').forEach(b => b.classList.remove('active'));
              frame.classList.add('active');
              btn.classList.add('active');
            });
          });
        });
    </script>
  </body>
</html>
