name: Render CV and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'CV/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare output directory
        run: |
          mkdir -p _site
          find CV -name "*.html" -exec cp {} _site/index.html \;
          find CV -name "*.pdf" -exec cp {} _site/Boonyakorn_Tanrattanakorn_CV.pdf \;

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
