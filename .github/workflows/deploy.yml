name: Render CV and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '**.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install RenderCV
        run: pip install rendercv[full]

      - name: Render CV
        run: rendercv render "Boonyakorn_Tanrattanakorn_CV.yaml"

      - name: Prepare output directory
        run: |
          mkdir -p _site
          cp rendercv_output/*.html _site/index.html
          cp rendercv_output/*.pdf _site/Boonyakorn_Tanrattanakorn_CV.pdf || true
          cp rendercv_output/*.png _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
